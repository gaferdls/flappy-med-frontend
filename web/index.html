<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Med</title>
  <link rel="stylesheet" href="/_addons/flappy_med/web/css/game.css">
</head>

<body>
  <div class="app-shell">
    <header class="hud">
      <div class="hud-item">Score: <span id="score">0</span></div>
      <div class="hud-item">Best: <span id="best-score">0</span></div>
      <div class="hud-item hud-lives">&#9829; <span id="hud-free-lives">3</span></div>
      <div class="hud-item hud-coins">&#9679; <span id="hud-coins">0</span></div>
    </header>

    <div class="content">
      <main class="game-panel">
        <canvas id="game-canvas" width="460" height="640" aria-label="Flappy Med game canvas"></canvas>

        <section id="overlay" class="overlay overlay-visible" aria-live="polite">
          <div class="overlay-card">
            <h1>Flappy Med</h1>
            <p>Click or press Space to flap.</p>
            <p>Avoid the IV pipes. Don’t faceplant.</p>
            <p class="overlay-subtle">
              Press Space / Click to start. Press again after death to instantly restart.
            </p>
          </div>
        </section>
      </main>

      <div class="sidebar">
        <aside class="leaderboard-panel">
          <h2>Leaderboard</h2>
          <div class="player-settings">
            <label for="display-name-input">Display name</label>
            <div class="player-settings-row">
              <input id="display-name-input" type="text" maxlength="12" placeholder="Player" autocomplete="off"
                spellcheck="false" />
              <button id="save-name-button" type="button">Save</button>
            </div>
            <div id="name-feedback" class="name-feedback" aria-live="polite"></div>
          </div>
          <ul id="leaderboard-list">
            <li class="leaderboard-empty">No scores yet</li>
          </ul>
        </aside>

        <aside class="store-panel">
          <p class="store-text">Lives, skins &amp; themes</p>
          <button class="store-button" id="store-open-btn" type="button">Store</button>
        </aside>
        <aside class="donate-panel">
          <p class="donate-text">Enjoying Flappy Med?</p>
          <button class="donate-button" type="button"
            onclick="FlappyMedBridge.openUrl('https://buymeacoffee.com/geanpierre')">
            Buy me a coffee
          </button>
        </aside>
      </div>
    </div>
    <div id="store-modal" class="store-modal" role="dialog" aria-modal="true" aria-labelledby="store-modal-title">
      <div class="store-modal-card">
        <h2 id="store-modal-title">Store</h2>
        <div class="store-items">
          <div class="store-item">
            <div class="store-item-info"><span>+1 Life</span></div>
            <button id="buy-1-life-btn" class="buy-button" type="button"><span class="cost">&#9679; 15</span></button>
          </div>
          <div class="store-item">
            <div class="store-item-info"><span>+3 Lives</span><span class="discount">Best Value</span></div>
            <button id="buy-3-lives-btn" class="buy-button" type="button"><span class="cost">&#9679; 40</span></button>
          </div>
        </div>
        <button id="store-modal-close" class="store-modal-close" type="button">Close</button>
      </div>
    </div>

    <script src="/_addons/flappy_med/web/js/bridge.js"></script>
    <script src="/_addons/flappy_med/web/js/economy.js"></script>
    <script src="/_addons/flappy_med/web/js/game.js"></script>
</body>

</html>
